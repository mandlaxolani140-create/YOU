<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YOU</title>

<style>
    body {
        margin: 0;
        background: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        opacity: 1;
        transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out;
    }

    img {
        max-width: 70vw;
        max-height: 70vh;
        object-fit: contain;
    }

    .you-text {
        margin-top: 30px;
        font-size: 70px;
        font-weight: bold;
        color: #004d00;
        letter-spacing: 8px;
        text-shadow:
            0 0 10px #006600,
            0 0 20px #008000,
            0 0 40px #00aa00;
    }

    .play-button {
        margin-top: 50px;
        padding: 15px 30px;
        font-size: 24px;
        font-weight: bold;
        color: white;
        background: #008000;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 0 10px #00aa00;
        transition: transform 0.2s;
    }

    .play-button:hover {
        transform: scale(1.1);
    }

    /* Fade + zoom effect */
    .fade-out {
        opacity: 0;
        transform: scale(1.2);
    }
</style>
</head>

<body>

    <!-- Image -->
    <img src="pointing-finger.png" alt="Pointing Finger">

    <!-- Text -->
    <div class="you-text">YOU</div>

    <!-- Play Button -->
    <button class="play-button" id="play-btn">Play Audio</button>

    <!-- Audio -->
    <audio id="bg-audio">
        <source src="gugulethu.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

<script>
const audio = document.getElementById('bg-audio');
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', () => {
    audio.volume = 0.7;
    audio.play();
    playBtn.style.display = 'none'; // hide button after tap

    // Start fade-out after 3 seconds
    setTimeout(() => {
        document.body.classList.add('fade-out');

        setTimeout(() => {
            window.location.href = "gugulethu website.html"; // redirect
        }, 1500);

    }, 10000);
});
</script>

</body>
</html>
