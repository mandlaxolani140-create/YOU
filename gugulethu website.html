<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gugulethu Hidden Truth</title>

<style>
/* ================= */
/* RESET AND GLOBALS */
/* ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
}

/* ================= */
/* MAIN WRAPPER & HEADER */
/* ================= */
.wrapper {
    text-align: center;
    padding: 60px 20px;
}

.main-heading {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 50px;
}

.main-heading img {
    width: 55px;
    vertical-align: middle;
}

.green-text {
    color: #00ff66;
}

/* ================= */
/* SLOT GRID */
/* ================= */
.slot-area {
    display: grid;
    grid-template-columns: repeat(auto-fill, 160px);
    justify-content: center;
    gap: 30px;
}

.slot {
    width: 160px;
    height: 160px;
    border-radius: 15px;
    overflow: hidden;
    border: 2px solid #1aff9c;
    background: #111;
    cursor: pointer;
    position: relative;
    animation: float 4s ease-in-out infinite;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

.slot:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px #1aff9c;
}

.slot:active {
    transform: scale(0.96);
}

.slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
}

.slot-label {
    position: absolute;
    bottom: 0;
    width: 100%;
    text-align: center;
    background: rgba(0,0,0,0.7);
    font-size: 0.85rem;
    padding: 6px 0;
    letter-spacing: 1px;
}

/* ================= */
/* OVERLAY */
/* ================= */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.97);
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-y: auto;
    z-index: 1000;
    animation: fadeIn 0.5s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.overlay img {
    max-width: 90%;
    max-height: 60vh;
    object-fit: contain;
    margin-bottom: 30px;
}

.overlay-text {
    max-width: 900px;
    font-size: 1.1rem;
    line-height: 1.8;
    text-align: center;
    color: #12a850;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 2rem;
    cursor: pointer;
}

.close-btn:hover {
    color: #1aff9c;
}
</style>
</head>
<body>

<div class="wrapper">
    <h1 class="main-heading">
        <span class="green-text">WHAT</span>
        <img src="pointing-finger.png" alt="pointing">
        <span class="green-text">DONT KNOW ABOUT GUGULETHU!!</span>
    </h1>

    <!-- SLOT GRID -->
    <div class="slot-area">

        <!-- SLOT 1 -->
        <div class="slot" onclick="openOverlay('statues.png', `Do you think these people are resting in peace? The seven men remembered by the statues in Gugulethu were killed in 1986. At first, the police said it was a fair fight, a shootout. That was the story told on the news. But later it came out that the meeting had been set up. The police had planned it. They knew where the young men would be. They were waiting.

The dark truth is that the scene was not chaos. It was controlled. The men were watched, guided, and then trapped. Some officers later admitted that it was an operation, not a sudden clash. This means the deaths were not just violence in the street. They were part of a plan. That changes everything.

Years later, the Truth and Reconciliation Commission heard what really happened. Some officers spoke. Some did not. Not everyone faced real punishment. Not every name was fully exposed. Some details were lost, some protected, some buried with time. Families were given answers, but not all the answers.

So are they resting in peace? How can they, when the full truth may still sit in closed files and in the minds of men who never spoke? The statues stand strong and silent, but silence is not peace. Memory is not justice. And when justice is not complete, rest is not complete either.`, true)">
            <img src="statues.png" alt="Slot 1">
            <div class="slot-label">Slot 1</div>
        </div>

        <!-- SLOT 2 -->
        <div class="slot" onclick="openOverlayMultipleItems()">
            <img src="promised future.png" alt="Slot 2">
            <div class="slot-label">Slot 2</div>
        </div>

    </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <div class="close-btn" onclick="closeOverlay()">✕</div>
    <img id="overlayImage" style="display:none;">
    <div class="overlay-text" id="overlayText"></div>
</div>

<script>
// SLOT 1 FUNCTION
function openOverlay(imageSrc, textContent, showImage = true) {
    const overlay = document.getElementById("overlay");
    const overlayImage = document.getElementById("overlayImage");
    const overlayText = document.getElementById("overlayText");

    overlayText.innerHTML = textContent;

    if (showImage && imageSrc) {
        overlayImage.src = imageSrc;
        overlayImage.style.display = "block";
    } else {
        overlayImage.style.display = "none";
    }

    overlay.style.display = "flex";
}

// CLOSE FUNCTION
function closeOverlay() {
    document.getElementById("overlay").style.display = "none";
}

// SLOT 2 MULTIPLE ITEMS
const slot2Content = [
    {
        src: 'promised future.png',
        text: `“The Promised Future of Gugulethu” hangs over the picture like a cruel joke. The shacks are not just tin and scrap — they are proof of speeches that disappear when the microphones turn off. The ground is full of dirt and trash, and the air is heavy with broken promises. Government people come with fake care, promising houses, clean streets, safety, jobs — painting bright futures with words that never come true. But behind doors, they care only for power, money, and staying in office. Budgets shrink, timelines get longer, committees “look into it,” and the people wait.

The horror is not fast — it is slow and planned. The promises were never meant to be real. They are tools, said every election, to calm anger just enough to win again. The land stays dirty because fixing it would mean stopping corruption, facing greed, and sharing resources. So the shacks stay. The trash stays. And the “promised future” becomes worse than neglect — it proves the lie was always planned.`
    },
    {
        src: 'shacks.png',
        text: `CHANGE WAS PROMISED!!

They said change was coming. They shouted it from stages, on TV, on radio. But the change never came. Only silence. Only fake peace. The shacks stay. The trash stays. The dirt stays. People live here and start to think it is normal — they make homes in trash, sleep on dirt, breathe the bad air, eat what they can. Comfort grows in filth. Kids play in mud. Adults shrug. Survival becomes life.

The government talks. Always talks. Promises houses, jobs, schools, lights, clean streets. But behind doors, they take the money. They move it to their friends. Committees “look into it” while pockets fill. Corruption eats everything. Elections come. Promises return. Same lies, same words. People wait. People hope. People get nothing.

Change was promised. But the promise was a trap. The trap is now the life here. The lie is everywhere — in the dirt, the shacks, the empty streets. And those who said they would save us? They only save themselves.`
    },
    {
        src: 'renewal.png',
        text: `They say rebirth.
They say renewal.
But it’s all bullshit to make people vote.
They come to Gugulethu in fancy clothes, clean shoes, fake smiles. Talking about “help” while they look down on the same people they begging votes from. They don’t care about us. They care about money. About positions. About salaries built on people crying and suffering.
What you don’t know about Gugulethu is how many lies hold this place together. How much corruption runs quietly. How many threats shut people up. How violence becomes normal. How people disappear and everyone is told to move on. All to protect the lie.
They act blind but they see everything.
They act human but they feel nothing.
They are liars.
And they will never care.
So the real question is not what they doing, It's whether (the pointing finger.png) keep watching and pretending you don’t see it.`,
        inlineImg: 'pointing finger.png'
    }
];

function openOverlayMultipleItems() {
    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");
    const overlayImage = document.getElementById("overlayImage");

    overlayImage.style.display = "none";
    overlayText.innerHTML = "";

    slot2Content.forEach(item => {
        if(item.src) {
            const img = document.createElement('img');
            img.src = item.src;
            img.style.maxWidth = "90%";
            img.style.marginBottom = "15px";
            img.style.objectFit = "contain";
            overlayText.appendChild(img);
        }

        const p = document.createElement('p');
        p.style.marginBottom = "30px";
        p.style.color = "#12a850";
        p.style.fontSize = "1.1rem";

        if(item.inlineImg) {
            // Split last sentence for inline image
            const parts = item.text.split(/\(([^)]+)\)/); // match (file.png)
            p.appendChild(document.createTextNode(parts[0]));
            const imgInline = document.createElement('img');
            imgInline.src = item.inlineImg;
            imgInline.style.height = "40px";
            imgInline.style.margin = "0 6px";
            imgInline.style.verticalAlign = "middle";
            p.appendChild(imgInline);
            if(parts[2]) p.appendChild(document.createTextNode(parts[2]));
        } else {
            p.innerText = item.text;
        }

        overlayText.appendChild(p);
    });

    overlay.style.display = "flex";
}
</script>

</body>
</html>
